<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>API Recorder Pro</title>
  <style>
    :root {
      --bg-dark: #0f172a;
      --bg-card: #1e293b;
      --primary: #10b981;
      --primary-hover: #059669;
      --danger: #ef4444;
      --danger-hover: #dc2626;
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --border: #334155;
    }
    
    body {
      width: 320px;
      font-family: system-ui, -apple-system, sans-serif;
      background-color: var(--bg-dark);
      color: var(--text);
      margin: 0;
      padding: 16px;
      box-sizing: border-box;
    }
    
    h2 {
      margin-top: 0;
      margin-bottom: 12px;
      font-size: 17px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 6px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 8px;
    }
    
    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    
    .status-row span {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
    }
    
    .status-badge-text {
      padding: 3px 10px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      background-color: #1e293b;
      border: 1px solid #475569;
      color: #94a3b8;
      letter-spacing: 0.05em;
    }
    
    .status-badge-text.recording {
      background-color: rgba(239, 68, 68, 0.15);
      border-color: var(--danger);
      color: var(--danger);
      animation: pulse 1.5s infinite;
    }
    
    @keyframes pulse {
      0% { opacity: 0.7; }
      50% { opacity: 1; }
      100% { opacity: 0.7; }
    }
    
    .button-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
    }
    
    button {
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      padding: 10px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.2s ease;
    }
    
    #btn-record {
      background-color: var(--danger);
      color: white;
    }
    #btn-record:hover {
      background-color: var(--danger-hover);
    }
    
    #btn-record.recording {
      background-color: #475569;
    }
    #btn-record.recording:hover {
      background-color: #334155;
    }
    
    #btn-extract, #btn-extract-llm {
      background-color: var(--bg-card);
      color: var(--text);
      border: 1px solid var(--border);
      font-size: 12px;
      padding: 8px 10px;
    }
    #btn-extract:hover, #btn-extract-llm:hover {
      background-color: var(--border);
    }
    #btn-extract.active {
      background-color: rgba(16, 185, 129, 0.2);
      border-color: var(--primary);
      color: var(--primary);
    }
    
    #btn-export {
      background-color: var(--primary);
      color: white;
    }
    #btn-export:hover {
      background-color: var(--primary-hover);
    }
    #btn-export:disabled {
      background-color: var(--bg-card);
      color: var(--text-muted);
      border: 1px solid var(--border);
      cursor: not-allowed;
      opacity: 0.6;
    }
    
    #btn-clear {
      background-color: #f8fafc;
      color: #0f172a;
      border: 1px solid #cbd5e1;
    }
    #btn-clear:hover {
      background-color: #e2e8f0;
    }
    
    .panel {
      background-color: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 16px;
    }
    
    .panel-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-top: 0;
      margin-bottom: 8px;
    }
    
    .steps-container {
      max-height: 140px;
      overflow-y: auto;
      font-size: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-family: inherit;
    }
    
    .step-item {
      padding: 2px 0;
      word-break: break-all;
      color: #e2e8f0;
    }
    
    .empty-steps {
      color: var(--text-muted);
      text-align: center;
      padding: 16px 0;
      font-style: italic;
    }
    
    .setting-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      margin-top: 12px;
      border-top: 1px solid var(--border);
      padding-top: 12px;
    }
    
    .setting-row label {
      color: var(--text-muted);
      font-weight: 600;
    }
    
    .setting-row input {
      flex: 1;
      background-color: var(--bg-dark);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      padding: 4px 6px;
      font-family: monospace;
      font-size: 11px;
    }
    
    .msg {
      font-size: 11px;
      text-align: center;
      padding: 6px;
      border-radius: 4px;
      display: none;
      margin-top: 8px;
    }
    .msg.success {
      background-color: rgba(16, 185, 129, 0.15);
      color: #34d399;
      display: block;
    }
    .msg.error {
      background-color: rgba(239, 68, 68, 0.15);
      color: #f87171;
      display: block;
    }
  </style>
</head>
<body>
  <h2>
    <span style="color: #3b82f6;">⚡</span> API Recorder Pro
  </h2>
  
  <div class="status-row">
    <span>Status:</span>
    <span id="badge" class="status-badge-text">IDLE</span>
  </div>

  <div class="button-group">
    <button id="btn-record">Start Recording</button>
    
    <!-- Extract target buttons, only shown during recording -->
    <div id="extract-group-container" style="display: none; grid-template-columns: 1fr 1fr; gap: 8px;">
      <button id="btn-extract">Select Extract</button>
      <button id="btn-extract-llm">Query with AI</button>
    </div>
    
    <button id="btn-export" disabled>🚀 Send to Marketplace</button>
    <button id="btn-clear">✓ Clear Steps</button>
  </div>
  
  <div class="panel">
    <div class="panel-title" id="panel-title-text">RECORDED STEPS (0)</div>
    <div id="steps-list" class="steps-container">
      <div class="empty-steps">No steps recorded yet.</div>
    </div>
  </div>
  
  <div class="setting-row">
    <label for="backend-url">Host:</label>
    <input type="text" id="backend-url" value="http://localhost:3000">
  </div>
  
  <div id="status-message" class="msg"></div>

  <script src="popup.js"></script>
</body>
</html>
