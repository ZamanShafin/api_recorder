<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>API Flow Recorder</title>
  <style>
    :root {
      --bg-dark: #0f172a;
      --bg-card: #1e293b;
      --primary: #10b981;
      --primary-hover: #059669;
      --danger: #ef4444;
      --danger-hover: #dc2626;
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --border: #334155;
    }
    
    body {
      width: 320px;
      font-family: system-ui, -apple-system, sans-serif;
      background-color: var(--bg-dark);
      color: var(--text);
      margin: 0;
      padding: 12px;
      box-sizing: border-box;
    }
    
    h2 {
      margin-top: 0;
      margin-bottom: 8px;
      font-size: 16px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .status-badge {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: var(--text-muted);
    }
    
    .status-badge.recording {
      background-color: var(--danger);
      animation: pulse 1.5s infinite;
    }
    
    @keyframes pulse {
      0% { opacity: 0.5; }
      50% { opacity: 1; }
      100% { opacity: 0.5; }
    }
    
    .button-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 12px;
    }
    
    button {
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.2s ease;
    }
    
    #btn-record {
      background-color: var(--primary);
      color: white;
    }
    #btn-record:hover {
      background-color: var(--primary-hover);
    }
    
    #btn-record.recording {
      background-color: var(--danger);
    }
    #btn-record.recording:hover {
      background-color: var(--danger-hover);
    }
    
    #btn-extract, #btn-extract-llm {
      background-color: var(--bg-card);
      color: var(--text);
      border: 1px solid var(--border);
    }
    #btn-extract:hover, #btn-extract-llm:hover {
      background-color: var(--border);
    }
    #btn-extract.active {
      background-color: rgba(16, 185, 129, 0.2);
      border-color: var(--primary);
      color: var(--primary);
    }
    #btn-extract-llm:disabled {
      background-color: var(--bg-card);
      color: var(--text-muted);
      border: 1px solid var(--border);
      cursor: not-allowed;
      opacity: 0.5;
    }
    
    #btn-export {
      background-color: #3b82f6;
      color: white;
    }
    #btn-export:hover {
      background-color: #2563eb;
    }
    #btn-export:disabled {
      background-color: var(--bg-card);
      color: var(--text-muted);
      border: 1px solid var(--border);
      cursor: not-allowed;
    }
    
    .panel {
      background-color: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px;
      margin-bottom: 12px;
    }
    
    .panel-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-top: 0;
      margin-bottom: 6px;
    }
    
    .steps-container {
      max-height: 120px;
      overflow-y: auto;
      font-size: 11px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    
    .step-item {
      padding: 4px 6px;
      background-color: var(--bg-dark);
      border-radius: 4px;
      border-left: 3px solid #3b82f6;
      word-break: break-all;
    }
    
    .step-item.extract {
      border-left-color: var(--primary);
    }
    
    .step-item.navigate {
      border-left-color: #a855f7;
    }
    
    .empty-steps {
      color: var(--text-muted);
      text-align: center;
      padding: 12px 0;
      font-style: italic;
    }
    
    .setting-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      margin-bottom: 8px;
    }
    
    .setting-row input {
      flex: 1;
      background-color: var(--bg-dark);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      padding: 4px 6px;
      font-family: monospace;
    }
    
    .msg {
      font-size: 11px;
      text-align: center;
      padding: 4px;
      border-radius: 4px;
      display: none;
    }
    .msg.success {
      background-color: rgba(16, 185, 129, 0.15);
      color: #34d399;
      display: block;
    }
    .msg.error {
      background-color: rgba(239, 68, 68, 0.15);
      color: #f87171;
      display: block;
    }
  </style>
</head>
<body>
  <h2>
    <span id="badge" class="status-badge"></span>
    API Flow Recorder
  </h2>
  
  <div class="setting-row">
    <label for="backend-url">Host:</label>
    <input type="text" id="backend-url" value="http://localhost:3000">
  </div>

  <div class="button-group">
    <button id="btn-record">Start Recording</button>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
      <button id="btn-extract" disabled>Select Extract</button>
      <button id="btn-extract-llm" disabled>Query with AI</button>
    </div>
  </div>
  
  <div class="panel">
    <div class="panel-title">Recorded Steps</div>
    <div id="steps-list" class="steps-container">
      <div class="empty-steps">No steps recorded yet.</div>
    </div>
  </div>
  
  <div class="button-group">
    <button id="btn-export" disabled>Create API Endpoint</button>
  </div>
  
  <div id="status-message" class="msg"></div>

  <script src="popup.js"></script>
</body>
</html>
